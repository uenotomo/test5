<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>クイズ参加</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background-image: url("/static/img/back1.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            font-family: sans-serif;
            text-align: center;
        }

        .white_panel {
            background: rgba(0,0,0,0.65);
            padding: 20px 30px;
            border-radius: 20px;
            display: inline-block;
        }

        #name_area {
            margin-top: 150px;
        }

        #name_area h2.white_panel {
            font-size: 32px;
        }

        #name_area input {
            width: 70%;
            padding: 25px;
            font-size: 36px;
            border-radius: 20px;
            border: 3px solid #0ff;
            text-align: center;
            background: rgba(0,0,0,0.5);
            color: white;
        }

        #name_area button {
            margin-top: 40px;
            padding: 25px 60px;
            font-size: 36px;
            border-radius: 20px;
            background: #0aa;
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 15px #0ff;
        }

        #name_area button:hover {
            background: #0cc;
        }

        #name_area, #wait_area, #answer_result {
            margin-top: 80px;
        }

        #quiz_area {
            margin-top: 0;
        }

        #question {
            display: inline-block;
            max-width: 90%;
            background: #ffffff;
            color: #000000;
            padding: 20px 30px;
            border-radius: 16px;
            border: 3px solid #333;
            box-shadow: 0 0 18px rgba(0,0,0,0.6);
            font-size: 32px;
            font-weight: bold;
            margin: 20px auto 10px auto;
            text-shadow: none;
        }

        #choices_grid {
            margin-top: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 90%;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .choice_btn {
            padding: 16px 14px;
            font-size: 24px;
            background: #ffffff;
            border: 3px solid #333;
            border-radius: 16px;
            cursor: pointer;
            color: #000000;
            box-shadow: 0 0 16px rgba(0,0,0,0.6);

            display: flex;
            flex-direction: column;
            align-items: stretch;   /* ★ 左揃えに統一 */
            justify-content: flex-start;

            min-height: 150px;
            max-height: 260px;
            overflow: hidden;
        }

        .choice_btn:hover {
            background: #f5f5f5;
        }

        .choice_btn:disabled {
            opacity: 0.6;
            cursor: default;
        }

        .choice_label_row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;  /* ★ 左揃え */
        }

        .choice_mark {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: #ffffff;
            flex-shrink: 0;
        }

        .choice_mark_A { background-color: #007bff; }
        .choice_mark_B { background-color: #ff3b30; }
        .choice_mark_C { background-color: #34c759; }
        .choice_mark_D { background-color: #ffcc00; color: #ffffff; } /* ★ 修正 */

        .choice_label_text {
            font-size: 20px;   /* ★ 少し小さく */
            font-weight: bold;
            color: #000000;
        }

        .choice_img {
            margin-top: 4px;
            max-height: 180px;
            max-width: 100%;
            width: auto;
            border-radius: 12px;
            object-fit: contain;
            align-self: center;
        }

        .choice_text_only,
        .choice_text_small {
            margin-top: 10px;
            font-weight: bold;
            color: #000000;
            width: 100%;        /* ★ 左端揃え */
            text-align: left;   /* ★ 左揃え */
        }

        .choice_text_only {
            font-size: 26px;
        }

        .choice_text_small {
            font-size: 20px;
        }

        #correct_answer {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #000;
        }

        #your_result {
            font-size: 30px;
            text-shadow: 0 0 10px #000;
        }

        .stage_list {
            text-align: left;
            display: inline-block;
            margin-top: 10px;
        }

    </style>
</head>
<body>
    <!-- 名前入力 -->
    <div id="name_area">
        <h2 class="white_panel">名前を入力してください</h2>
        <br><br>
        <input id="name"><br><br>
        <button onclick="registerName()">登録</button>
    </div>

    <!-- 待機画面 -->
    <div id="wait_area" style="display:none;">
        <h2 class="white_panel">司会者が問題を出すまでお待ちください</h2>
    </div>

    <!-- 問題表示 -->
    <div id="quiz_area" style="display:none;">
        <h2 id="question"></h2>
        <div id="choices"></div>
    </div>

    <!-- 回答結果 -->
    <div id="answer_result" style="display:none; margin-top:30px;">
        <h2 id="correct_answer"></h2>
        <h3 id="your_result"></h3>
    </div>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script>
        const socket = io({ transports: ["polling"] });

        let username = "";
        let questionActive = false;
        let latestCorrectChoice = null;

        function switchToMainBackground(){
            document.body.style.backgroundImage = 'url("/static/img/back2.png")';
        }

        function registerName(){
            username = document.getElementById("name").value;

            if(username === ""){
                alert("名前を入力してください");
                return;
            }

            alert("登録しました：" + username);

            switchToMainBackground();

            document.getElementById("name_area").style.display = "none";
            document.getElementById("wait_area").style.display = "block";
        }

        function sendAnswer(choice){
            socket.emit("answer", {name: username, choice: choice});
            disableChoices();
        }

        function disableChoices(){
            const buttons = document.querySelectorAll("#choices button");
            buttons.forEach(btn => btn.disabled = true);
        }

        socket.on("show_stage", data => {

            switchToMainBackground();

            document.getElementById("quiz_area").style.display = "none";
            document.getElementById("answer_result").style.display = "none";

            const waitArea = document.getElementById("wait_area");
            const waitTitle = waitArea.querySelector("h2");

            if(data.stage === 1){
                waitTitle.innerHTML = `
                    <div class="white_panel">
                        <p>新郎新婦クイズのルール</p>
                        <div class="stage_list">
                            <p>1. 早押しクイズです</p>
                            <p>2. 正解するとポイントが入ります</p>
                            <p>3. 最後に総合ランキングを発表します</p>
                        </div>
                    </div>
                `;
            }
            else if(data.stage === 2){
                waitTitle.innerHTML = `
                    <div class="white_panel">
                        <p>練習問題</p>
                        <p>これから練習問題を1問出します。</p>
                    </div>
                `;
            }
            else if(data.stage === 4){
                waitTitle.innerHTML = `
                    <div class="white_panel">
                        <p>本問題</p>
                        <p>ここから本番5問が始まります。</p>
                    </div>
                `;
            }
            else{
                waitTitle.innerHTML = `
                    <div class="white_panel">
                        司会者が問題を出すまでお待ちください
                    </div>
                `;
            }

            waitArea.style.display = "block";
        });

        const markMap = { "A": "1", "B": "2", "C": "3", "D": "4" };

        socket.on("show_question", data => {
            questionActive = true;

            switchToMainBackground();

            document.getElementById("wait_area").style.display = "none";
            document.getElementById("quiz_area").style.display = "block";
            document.getElementById("answer_result").style.display = "none";

            document.getElementById("question").innerText = data.text;

            let html = "<div id='choices_grid'>";
            for (const key in data.choices){
                const value = data.choices[key];
                const num = markMap[key];

                const isSmall =
                    value.label.includes("おめでとう") ||
                    value.label.includes("お幸せに") ||
                    value.label.includes("知佳ちゃん") ||
                    value.label.includes("智也さん") ||
                    value.label.includes("はい、お願いします") ||
                    value.label.includes("おっけー") ||
                    value.label.includes("・・・") ||
                    value.label.includes("ごめんなさい");

                html += `
                    <button class="choice_btn" onclick="sendAnswer('${key}')">
                        ${
                            value.img
                            ? `
                                <div class="choice_label_row">
                                    <div class="choice_mark choice_mark_${key}">
                                        ${num}
                                    </div>
                                    <div class="choice_label_text">${value.label}</div>
                                </div>
                                <img src="${value.img}" class="choice_img">
                              `
                            : `
                                <div class="choice_label_row">
                                    <div class="choice_mark choice_mark_${key}">
                                        ${num}
                                    </div>
                                </div>
                                <div class="${isSmall ? "choice_text_small" : "choice_text_only"}">
                                    ${value.label}
                                </div>
                              `
                        }
                    </button>
                `;
            }
            html += "</div>";
            document.getElementById("choices").innerHTML = html;
        });

        socket.on("correct_choice", data => {
            latestCorrectChoice = data.correct_choice;
        });

        socket.on("ranking", list => {
            if (!questionActive) return;

            document.getElementById("correct_answer").innerText =
                "正解は：" + latestCorrectChoice;

            if (latestCorrectChoice === "ALL") {
                document.getElementById("your_result").innerText = "さすが！正解です！";
                document.getElementById("answer_result").style.display = "block";
                questionActive = false;
                return;
            }

            const me = list.find(a => a.name === username);

            if (me) {
                document.getElementById("your_result").innerText = "さすが！正解です！";
            } else {
                document.getElementById("your_result").innerText = "ごめんなさい、不正解です！";
            }

            document.getElementById("answer_result").style.display = "block";

            questionActive = false;
        });

    </script>

</body>
</html>
